<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusGo - Bus Ticket Booking</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card glass-card">
      <div class="login-header">
        <div class="logo">🚌</div>
        <h1 class="logo-text">BusGo</h1>
        <p>Your Premium Bus Booking Platform</p>
      </div>

      <div id="alertContainer" class="alert-container"></div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email or Mobile Number</label>
          <input 
            type="text" 
            id="emailOrMobile" 
            class="form-input" 
            placeholder="Enter email or 10-digit mobile"
            required
          >
          <div class="form-error" id="emailOrMobileError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-password-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password"
              required
            >
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
              👁️
            </button>
          </div>
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="remember-forgot">
          <label class="checkbox-wrapper">
            <input type="checkbox" class="checkbox" id="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Sign In
        </button>
      </form>

      <div class="form-divider">
        <span>OR</span>
      </div>

      <div class="social-buttons">
        <button class="social-btn" onclick="handleSocialLogin('Google')">
          <span>🔵</span> Google
        </button>
        <button class="social-btn" onclick="handleSocialLogin('Facebook')">
          <span>🔷</span> Facebook
        </button>
      </div>

      <div class="login-footer">
        Don't have an account? 
        <span class="signup-link" onclick="handleSignUp()">Create one now</span>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <button class="close-modal" onclick="UI.closeModal('successModal')">×</button>
      <div class="checkmark">✓</div>
      <h2>Login Successful</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Welcome back to BusGo!</p>
      <button class="btn btn-primary btn-block" onclick="redirectToBooking()">Continue</button>
    </div>
  </div>

  <script src="scripts/utilities.js"></script>
  <script>
    // Toggle Password Visibility
    function togglePasswordVisibility(fieldId) {
      const field = document.getElementById(fieldId);
      const btn = event.target;
      if (field.type === 'password') {
        field.type = 'text';
        btn.textContent = '👁️‍🗨️';
      } else {
        field.type = 'password';
        btn.textContent = '👁️';
      }
    }

    // Handle Login
    function handleLogin(e) {
      e.preventDefault();
      
      const emailOrMobile = document.getElementById('emailOrMobile').value;
      const password = document.getElementById('password').value;

      // Clear previous errors
      UI.clearError('emailOrMobileError');
      UI.clearError('passwordError');

      let hasError = false;

      // Validation
      if (Validation.isEmpty(emailOrMobile)) {
        UI.showError('emailOrMobileError', 'Email or mobile is required');
        hasError = true;
      } else if (!Validation.isEmailOrMobile(emailOrMobile)) {
        UI.showError('emailOrMobileError', 'Please enter a valid email or 10-digit mobile');
        hasError = true;
      }

      if (Validation.isEmpty(password)) {
        UI.showError('passwordError', 'Password is required');
        hasError = true;
      } else if (password.length < 6) {
        UI.showError('passwordError', 'Password must be at least 6 characters');
        hasError = true;
      }

      if (hasError) return;

      // Save login data
      const loginData = {
        emailOrMobile: emailOrMobile,
        rememberMe: document.getElementById('rememberMe').checked,
        loginTime: new Date().toISOString()
      };
      Storage.set('loginData', loginData);
      Storage.set('userEmail', emailOrMobile);

      // Show success popup
      UI.showSuccessPopup(
        'Login Successful!',
        'Welcome back to BusGo! Redirecting to booking...',
        () => redirectToBooking()
      );
    }

    // Handle Social Login
    function handleSocialLogin(platform) {
      UI.showAlert(`${platform} login simulation (Frontend only)`, 'warning');
      setTimeout(() => {
        Storage.set('userEmail', `user@${platform.toLowerCase()}.com`);
        redirectToBooking();
      }, 2000);
    }

    // Handle Sign Up
    function handleSignUp() {
      UI.showAlert('Sign up redirect to registration page', 'info');
    }

    // Redirect to Booking
    function redirectToBooking() {
      window.location.href = 'booking.html';
    }

    // Load Remember Me Data
    window.addEventListener('DOMContentLoaded', () => {
      const loginData = Storage.get('loginData');
      if (loginData && loginData.rememberMe) {
        document.getElementById('emailOrMobile').value = loginData.emailOrMobile;
      }
    });
  </script>
</body>
</html>
