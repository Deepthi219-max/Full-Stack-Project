<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - BusGo</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/forgot-password.css">
</head>
<body>
  <div class="forgot-container">
    <div class="forgot-card glass-card">
      <div class="forgot-header">
        <a href="login.html" class="back-link">← Back to Login</a>
        <div class="illustration">🔐</div>
        <h2>Forgot Password?</h2>
        <p>Don't worry! We'll help you reset your password.</p>
      </div>

      <div class="info-box">
        We'll send an OTP to your registered email or mobile number to verify your identity.
      </div>

      <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)">
        <div class="forgot-form-group">
          <label class="forgot-label">Email or Mobile Number</label>
          <input 
            type="text" 
            id="forgotEmailOrMobile" 
            class="forgot-input" 
            placeholder="Enter registered email or 10-digit mobile"
            required
          >
          <div class="forgot-error" id="forgotEmailError"></div>
        </div>

        <button type="submit" class="send-otp-btn" id="sendOtpBtn">
          Send OTP
        </button>
      </form>

      <div class="forgot-footer">
        Remember your password? 
        <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="checkmark">✓</div>
      <h2>OTP Sent Successfully!</h2>
      <p style="color: var(--text-secondary); margin-bottom: 1.5rem;" id="otpSentMessage"></p>
      <button class="btn btn-primary btn-block" onclick="redirectToOTP()">Verify OTP</button>
    </div>
  </div>

  <script src="scripts/utilities.js"></script>
  <script>
    // Handle Forgot Password
    function handleForgotPassword(e) {
      e.preventDefault();
      
      const emailOrMobile = document.getElementById('forgotEmailOrMobile').value;
      
      // Clear previous errors
      UI.clearError('forgotEmailError');

      // Validation
      if (Validation.isEmpty(emailOrMobile)) {
        UI.showError('forgotEmailError', 'Email or mobile is required');
        return;
      } else if (!Validation.isEmailOrMobile(emailOrMobile)) {
        UI.showError('forgotEmailError', 'Please enter a valid email or 10-digit mobile');
        return;
      }

      // Simulate sending OTP
      const button = document.getElementById('sendOtpBtn');
      UI.disableButton('sendOtpBtn');
      button.textContent = 'Sending...';

      setTimeout(() => {
        // Generate and save OTP
        const otp = FakeData.generateOTP();
        Storage.set('resetOTP', otp);
        Storage.set('resetEmail', emailOrMobile);

        // Show success
        const message = document.getElementById('otpSentMessage');
        message.textContent = `An OTP has been sent to ${emailOrMobile}`;
        
        UI.showSuccessPopup(
          'OTP Sent!',
          `Verification code has been sent to ${emailOrMobile}`,
          () => redirectToOTP()
        );

        UI.enableButton('sendOtpBtn');
        button.textContent = 'Send OTP';
      }, 1500);
    }

    // Redirect to OTP Page
    function redirectToOTP() {
      window.location.href = 'otp.html';
    }

    // Auto-fill for testing
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('forgotEmailOrMobile').value = 'user@example.com';
    });
  </script>
</body>
</html>
